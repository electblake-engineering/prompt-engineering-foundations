name: Deploy Next.js site to Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Setup Pages
        id: setup_pages
        uses: actions/configure-pages@v5
        with:
          token: ${{ secrets.PAGES_ADMIN_TOKEN != '' && secrets.PAGES_ADMIN_TOKEN || github.token }}
          enablement: ${{ secrets.PAGES_ADMIN_TOKEN != '' }}

      - name: Verify Pages is enabled
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          status="$(curl -sS -o /tmp/pages.json -w "%{http_code}" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages")"

          if [ "${status}" = "200" ]; then
            echo "GitHub Pages is enabled for ${GITHUB_REPOSITORY}."
            exit 0
          fi

          if [ "${status}" = "404" ]; then
            echo "::error::GitHub Pages is not enabled for ${GITHUB_REPOSITORY}."
            echo "::error::Open Settings -> Pages and set Source to 'GitHub Actions'."
            echo "::error::Optional: add a PAGES_ADMIN_TOKEN secret (PAT with repo + pages write access) to let this workflow auto-enable Pages."
            exit 1
          fi

          echo "::error::Unexpected response while checking GitHub Pages (HTTP ${status})."
          cat /tmp/pages.json || true
          exit 1

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('src/**/*.[jt]s', 'src/**/*.[jt]sx', 'next.config.ts') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Build with Next.js
        run: npm run build
        env:
          PAGES_BASE_PATH: ${{ steps.setup_pages.outputs.base_path }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
